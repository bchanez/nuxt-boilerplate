name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - edited
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo $PR_TITLE | npx commitlint

      - name: Linter
        run: cd nuxt-app && pnpm run lint

      - name: Typecheck
        run: cd nuxt-app && pnpm run typecheck

      - name: Build
        run: cd nuxt-app && pnpm build

      - name: Install Playwright Browsers
        run: npx playwright install

      - name: Visual Regression Testing
        run: cd nuxt-app && pnpm run test:visual

      - name: Prepare VRT artifacts and generate updated visual snapshots
        if: failure()
        run: |
          mkdir -p vrt-artifacts/test-results
          cp -r nuxt-app/test-results/* vrt-artifacts/test-results/
          cd nuxt-app && pnpm run test:visualupdate

      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-screenshots
          path: |
            vrt-artifacts/test-results/
            nuxt-app/tests/visual/visual.spec.ts-snapshots/

  e2e:
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies & Playwright
        run: |
          cd nuxt-app
          pnpm install
          npx playwright install --with-deps chromium

      - name: Start services and wait for health checks
        run: |
          cd docker/test
          echo "Starting services..."
          docker compose up -d --wait
          echo "Services are healthy!"
          docker compose ps

      - name: Show service logs on failure
        if: failure()
        run: |
          cd docker/test
          docker compose logs app

      - name: Run E2E tests
        run: |
          cd nuxt-app
          pnpm e2e
        env:
          CI: true

      - name: Upload E2E reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-reports
          path: nuxt-app/e2e/reports/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          cd docker/test
          docker compose down -v
