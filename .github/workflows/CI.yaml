name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - edited
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo $PR_TITLE | npx commitlint

      - name: Lint
        run: cd nuxt-app && pnpm lint

      - name: Typecheck
        run: cd nuxt-app && pnpm typecheck

  e2e:
    runs-on: ubuntu-latest
    needs: [ci]
    if: ${{ needs.ci.result == 'success' }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies & Playwright
        run: |
          cd nuxt-app
          pnpm install
          npx playwright install --with-deps chromium

      - name: Start services and wait for health checks
        run: |
          cd docker/test
          echo "Starting services..."
          docker compose up -d --wait
          echo "Services are healthy!"
          docker compose ps

      - name: Show service logs on failure
        if: failure()
        run: |
          cd docker/test
          docker compose logs app

      - name: Visual Regression Testing
        run: |
          docker run --rm \
            --network nuxt-boilerplate-test_default \
            -e APP_URL=http://app:3000 \
            -v ${{ github.workspace }}:/app \
            -w /app/nuxt-app \
            mcr.microsoft.com/playwright:v1.54.0-noble \
            bash -c "npm install @playwright/test && npx playwright test --project=visual"

      - name: Upload VRT screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-screenshots
          path: nuxt-app/test-results/

      - name: Run E2E tests
        run: |
          cd nuxt-app
          pnpm test:e2e
        env:
          CI: true

      - name: Upload E2E reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-reports
          path: nuxt-app/reports/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          cd docker/test
          docker compose down -v
