name: nuxt-boilerplate-test
services:
  app:
    build:
      context: ../../
      dockerfile: docker/test/dockerfile
    ports:
      - 3001:3000
    environment:
      NUXT_SITE_URL: http://localhost:3001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
