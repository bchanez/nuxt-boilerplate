name: nuxt-boilerplate-dev
services:
  dev:
    build:
      context: ../../
      dockerfile: docker/dev/dockerfile
    command: sleep infinity
    volumes:
      - ../..:/app
      - ../../../claude:/app/.claude/rules/shared
      - ../../../claude/settings.json:/app/.claude/settings.json
      - /var/run/docker.sock:/var/run/docker.sock
